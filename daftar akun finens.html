<body class="bg-background min-h-screen flex items-center justify-center p-4 antialiased">
<main class="w-full max-w-[480px]">
<div class="flex justify-center mb-8">
<img alt="FinVis SaaS Logo" class="w-20 h-20 rounded-sm" src="https://lh3.googleusercontent.com/aida/ADBb0uhdU4e8348OXOp8oaJVT3JKJ_O-y9ZA0BKfod13VqPw0M8jfJa4dMMfJMhTd398dEQBpiis8-nxnC7tQwEopi-8grGAoh8IwLtXqptmCwzgFSUrzYEXzS-EgZ9Wzfg2JU_LCtcXjbcvQh3ni_OnVxy9_7mzDYBXfEnmUoa2vOAShOIO9MplOhacUMDvjkU5MGWXqKLntngtad0fYSxtlsc-DMu5qQEj2eLal6eThw5nIZqNit0lhslnk68n"/>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-card-padding shadow-sm hover:shadow-hover transition-shadow duration-300">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Daftar Akun</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">Buat akun untuk mengakses analitik finansial institusional.</p>
<form class="space-y-5">
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface" for="fullName">Nama Lengkap</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-secondary focus:ring-2 focus:ring-secondary/10 outline-none transition-all" id="fullName" placeholder="Masukkan nama lengkap Anda" type="text"/>
</div>
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface" for="companyName">Nama Perusahaan</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-secondary focus:ring-2 focus:ring-secondary/10 outline-none transition-all" id="companyName" placeholder="Contoh: PT Modal Ventura" type="text"/>
</div>
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface" for="businessEmail">Email Bisnis</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-secondary focus:ring-2 focus:ring-secondary/10 outline-none transition-all" id="businessEmail" placeholder="nama@perusahaan.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface" for="password">Kata Sandi</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-2.5 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-secondary focus:ring-2 focus:ring-secondary/10 outline-none transition-all" id="password" placeholder="Minimal 8 karakter" type="password"/>
</div>
<div class="flex items-start pt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary/20 bg-surface-container-lowest cursor-pointer" id="terms" type="checkbox"/>
</div>
<div class="ml-3">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="terms">
                            Saya menyetujui <a class="text-secondary hover:underline transition-all" href="#">Syarat dan Ketentuan</a> serta <a class="text-secondary hover:underline transition-all" href="#">Kebijakan Privasi</a> FinVis.
                        </label>
</div>
</div>
<button class="w-full bg-on-background hover:bg-inverse-surface text-on-primary font-label-md text-label-md py-3 rounded-lg transition-colors mt-8 flex items-center justify-center gap-2 group" type="button">
                    Buat Akun
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 0; font-size: 16px;">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Sudah punya akun? <a class="text-secondary font-medium hover:underline transition-all" href="#">Masuk</a>
</p>
</div>
